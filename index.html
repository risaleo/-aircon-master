<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0068b7">
<link rel="manifest" href="manifest.json?v=162">
<link rel="apple-touch-icon" href="icon.svg?v=162">
<title>エアコン販買マスター Ver.16.2</title>
<style>
:root{
  --navy:#0d2d54;
  --blue:#0677e8;
  --sky:#22b7f4;
  --pale:#edf7ff;
  --white:#ffffff;
  --green:#22b96f;
  --purple:#8955e8;
  --orange:#f4a321;
  --shadow:0 12px 30px rgba(25,91,145,.13);
}
*{box-sizing:border-box}
html{background:#eef7ff}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  color:var(--navy);
  background:
    radial-gradient(circle at 10% 5%,rgba(34,183,244,.18),transparent 25%),
    radial-gradient(circle at 90% 15%,rgba(137,85,232,.10),transparent 23%),
    linear-gradient(180deg,#f8fcff 0%,#edf7ff 100%);
}
button{font:inherit;-webkit-tap-highlight-color:transparent}
.app{max-width:720px;margin:auto;padding:10px}
.card{
  min-height:calc(100vh - 20px);
  background:rgba(255,255,255,.93);
  border:1px solid rgba(255,255,255,.8);
  border-radius:30px;
  padding:16px;
  box-shadow:0 18px 45px rgba(18,78,126,.14);
  backdrop-filter:blur(12px);
}
.hidden{display:none!important}

/* ホーム */
.hero{
  position:relative;
  overflow:hidden;
  min-height:310px;
  border-radius:26px;
  padding:27px 22px 24px;
  text-align:left;
  color:var(--navy);
  background:
    linear-gradient(135deg,rgba(255,255,255,.98),rgba(226,246,255,.92)),
    linear-gradient(135deg,#fff,#dff4ff);
  box-shadow:inset 0 0 0 1px rgba(8,119,232,.08);
}
.hero::before{
  content:"";
  position:absolute;
  width:290px;height:290px;border-radius:50%;
  top:-145px;left:-85px;
  background:linear-gradient(135deg,rgba(31,181,244,.32),rgba(6,119,232,.08));
}
.hero::after{
  content:"❄";
  position:absolute;
  right:24px;top:92px;
  font-size:58px;
  color:rgba(25,164,235,.22);
  transform:rotate(12deg);
}
.hero-ac{
  position:absolute;
  right:20px;top:24px;
  width:185px;height:62px;border-radius:14px;
  background:linear-gradient(180deg,#fff,#eaf4fb);
  box-shadow:0 12px 24px rgba(23,72,109,.18);
  border:1px solid #e7f0f6;
}
.hero-ac::before{
  content:"";
  position:absolute;left:18px;right:18px;bottom:10px;height:8px;
  border-radius:6px;background:#b9d4e8;
}
.hero-ac::after{
  content:"";
  position:absolute;right:18px;top:16px;width:7px;height:7px;
  border-radius:50%;background:#2ca7eb;
}
.cool-air{
  position:absolute;right:45px;top:79px;width:125px;height:72px;
  background:repeating-linear-gradient(110deg,transparent 0 13px,rgba(31,181,244,.22) 14px 19px,transparent 20px 31px);
  filter:blur(1px);
  transform:skewX(-8deg);
}
.hero-brand{
  position:relative;z-index:2;
  display:flex;align-items:center;gap:12px;
  margin-top:14px;
}
.hero img{
  width:76px;height:76px;border-radius:22px;
  box-shadow:0 12px 26px rgba(6,119,232,.22);
}
.hero-copy{position:relative;z-index:2;margin-top:30px;max-width:470px}
.hero h1{
  margin:0;
  font-size:clamp(30px,7vw,48px);
  line-height:1.13;
  letter-spacing:.01em;
  font-weight:950;
  text-shadow:0 3px 0 #fff;
}
.hero h1 span{display:block;color:var(--blue)}
.sub{
  margin:12px 0 0;
  color:#397197;
  font-size:16px;
  font-weight:700;
}
.version{
  display:inline-flex;
  align-items:center;
  gap:7px;
  margin-top:14px;
  padding:7px 13px;
  border-radius:999px;
  background:linear-gradient(135deg,#fff6c8,#ffe18b);
  color:#7d5b00;
  font-size:13px;
  font-weight:900;
  box-shadow:0 6px 16px rgba(230,172,20,.17);
}
.version::before{content:"★";color:#f4ae00}

/* メニュー */
.menu{display:grid;gap:12px;margin-top:14px}
button{
  border:0;
  border-radius:19px;
  padding:16px;
  width:100%;
  font-size:17px;
  font-weight:900;
  color:var(--navy);
  background:#fff;
  box-shadow:var(--shadow);
  transition:.16s ease;
}
button:active{transform:scale(.98)}
.primary{
  position:relative;
  min-height:96px;
  padding:17px 62px 17px 74px;
  text-align:left;
  color:#fff;
  background:linear-gradient(135deg,#0aa2f0,#0468d9 75%);
  overflow:hidden;
}
.primary::before{
  content:"?";
  position:absolute;left:18px;top:20px;
  width:48px;height:48px;border-radius:50%;
  display:grid;place-items:center;
  color:#096edb;background:#fff;
  font-size:29px;font-weight:950;
}
.primary::after{
  content:"›";
  position:absolute;right:18px;top:25px;
  width:45px;height:45px;border-radius:50%;
  display:grid;place-items:center;
  background:rgba(255,255,255,.22);
  font-size:38px;line-height:1;
}
.levelGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.levelGrid button{
  min-height:126px;
  padding:18px 8px 12px;
  font-size:20px;
  background:#fff;
}
.levelGrid button:nth-child(1){color:var(--green);background:linear-gradient(180deg,#fff,#edfff5)}
.levelGrid button:nth-child(2){color:var(--blue);background:linear-gradient(180deg,#fff,#eef7ff)}
.levelGrid button:nth-child(3){color:var(--purple);background:linear-gradient(180deg,#fff,#f6efff)}
.levelGrid button::before{
  display:block;margin:0 auto 8px;
  width:45px;height:45px;border-radius:50%;
  font-size:26px;line-height:45px;
}
.levelGrid button:nth-child(1)::before{content:"🌱";background:#daf8e8}
.levelGrid button:nth-child(2)::before{content:"📊";background:#dceeff}
.levelGrid button:nth-child(3)::before{content:"👑";background:#efe2ff}

.menu-action{
  position:relative;
  min-height:82px;
  padding:15px 55px 15px 78px;
  text-align:left;
  background:linear-gradient(90deg,#fff,#f8fbff);
}
.menu-action::before{
  position:absolute;left:16px;top:14px;
  width:52px;height:52px;border-radius:16px;
  display:grid;place-items:center;
  font-size:27px;color:#fff;
  box-shadow:0 8px 16px rgba(23,102,174,.18);
}
.menu-action::after{
  content:"›";
  position:absolute;right:20px;top:21px;
  font-size:33px;color:#6f8498;
}
.menu-action.record::before{content:"📖";background:linear-gradient(135deg,#1eb0ff,#0869d8)}


.menu-action small{display:block;margin-top:5px;color:#75889a;font-size:13px;font-weight:700}

.notice{
  position:relative;
  margin-top:14px;
  padding:17px 15px 17px 58px;
  border-radius:19px;
  color:#295578;
  line-height:1.65;
  font-size:14px;
  background:linear-gradient(135deg,#e7f5ff,#f5faff);
  border:1px solid #dbeefe;
}
.notice::before{
  content:"🛡️";
  position:absolute;left:16px;top:18px;font-size:28px;
}

/* 共通画面 */
.top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back{width:44px;height:44px;padding:0;border-radius:50%;box-shadow:none;background:#edf6fd;color:#106eb7}
.top h2,.top p{margin:0}
.pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{padding:6px 11px;border-radius:999px;background:#eaf5ff;color:#076fca;font-size:13px;font-weight:900}
.qno{font-weight:950;color:#0578dc;margin-top:18px}
.question{font-size:22px;line-height:1.55;font-weight:900;margin:8px 0 16px}
.choices{display:grid;gap:11px}
.choice{text-align:left;background:#f7fbff;border:2px solid #e7f1f9;box-shadow:none}
.choice.correct{background:#edfbee;border-color:#3eb767;color:#135b2e}
.choice.wrong{background:#fff0f0;border-color:#e95858;color:#862222}
.resultMark{font-size:80px;text-align:center;line-height:1.1}
.explain{margin-top:12px;border-radius:17px;padding:15px;background:#f4f9fe;line-height:1.7}
.next{margin-top:12px;min-height:auto;text-align:center;padding:15px}
.next::before,.next::after{display:none}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.stat{background:#f4f9fe;border-radius:16px;padding:12px;text-align:center}
.stat strong{display:block;font-size:25px;color:#0876d4}
.progressbar{height:11px;background:#e5eef6;border-radius:99px;overflow:hidden}
.progressbar span{display:block;height:100%;background:linear-gradient(90deg,#12b8f5,#0468d9)}




.small{font-size:13px;color:#63788d}

@media(max-width:520px){
  .app{padding:6px}
  .card{padding:12px;border-radius:22px}
  .hero{min-height:286px;padding:22px 17px}
  .hero-ac{width:150px;height:52px;right:15px}
  .cool-air{right:30px;top:69px}
  .hero img{width:65px;height:65px}
  .hero-copy{margin-top:32px}
  .hero h1{font-size:34px}
  .primary{font-size:18px}
  .levelGrid button{font-size:18px}
}
</style>
</head>
<body><main class="app">

<section id="home" class="card">
  <div class="hero">
    <div class="hero-ac"></div>
    <div class="cool-air"></div>
    <div class="hero-brand">
      <img src="icon.svg?v=162" alt="エアコン販買マスター">
    </div>
    <div class="hero-copy">
      <h1><span>エアコン</span>販買マスター</h1>
      <p class="sub">学んで、接客にもっと強くなる。</p>
      <span class="version">Ver.16.2</span>
    </div>
  </div>

  <div class="menu">
    <button class="primary" onclick="startQuiz('すべて')">ランダム問題を始める</button>

    <div class="levelGrid">
      <button onclick="startQuiz('初級')">初級</button>
      <button onclick="startQuiz('中級')">中級</button>
      <button onclick="startQuiz('上級')">上級</button>
    </div>

    <button class="menu-action record" onclick="showStats()">
      学習記録
      <small>成績と正答率を確認</small>
    </button>
  </div>

  <div class="notice">
    <strong>安心して学習できます</strong><br>
    同じ問題は、全360問を一巡するまで再出題されません。<br>指定された6メーカー・23シリーズを使った問題へ更新しました。
  </div>
</section>

<section id="quiz" class="card hidden">
<div class="top"><button class="back" onclick="showPage('home')">←</button><div><h2>問題</h2><p id="progressText" class="small"></p></div></div>
<div class="pills"><span id="levelPill" class="pill"></span><span id="catPill" class="pill"></span></div>
<div id="qno" class="qno"></div><div id="question" class="question"></div><div id="choices" class="choices"></div>
<div id="answerArea" class="hidden"><div id="mark" class="resultMark"></div><div id="explain" class="explain"></div><button class="primary next" onclick="nextQuestion()">次の問題</button></div>
</section>


<section id="complete" class="card hidden">
  <div class="top">
    <button class="back" onclick="showPage('home')">←</button>
    <h2>全問題クリア</h2>
  </div>
  <div style="text-align:center;padding:30px 10px">
    <div style="font-size:88px;line-height:1">🏆</div>
    <h2 style="font-size:28px;margin:14px 0 8px">全360問を解き終えました！</h2>
    <p style="line-height:1.8;color:#5f7488">
      同じ問題を自動で繰り返さないように停止しています。<br>
      もう一度解く場合だけ、下のボタンで履歴をリセットしてください。
    </p>
    <button class="primary next" onclick="resetAndRestart()">最初からもう一度</button>
    <button style="margin-top:10px" onclick="showPage('home')">ホームへ戻る</button>
  </div>
</section>

<section id="stats" class="card hidden">
<div class="top"><button class="back" onclick="showPage('home')">←</button><h2>学習記録</h2></div>
<div class="stats"><div class="stat"><strong id="stAnswered">0</strong>回答</div><div class="stat"><strong id="stCorrect">0</strong>正解</div><div class="stat"><strong id="stRate">0%</strong>正答率</div></div>
<div class="progressbar"><span id="stBar" style="width:0%"></span></div>
<p id="stRemain" class="small"></p>
<button class="primary" onclick="resetHistory()">出題履歴をリセット</button>
</section>
</main>
<script>

const HISTORY_KEY='aircon_v15_history', STATS_KEY='aircon_v15_stats';
function norm(v){return String(v??'').normalize('NFKC').replace(/\s+/g,'').replace(/[。、・,.!?！？「」『』（）()［］\[\]]/g,'').toLowerCase()}
function dedupe(list){const ids=new Set(), fps=new Set();return list.filter((q,i)=>{const id=String(q.id||i),f=[norm(q.q),...q.choices.map(norm).sort()].join('|');if(ids.has(id)||fps.has(f))return false;ids.add(id);fps.add(f);return true})}
const QUESTIONS=dedupe(RAW_QUESTIONS);
let mode='すべて', current=null, locked=false;
function loadHistory(){try{return new Set(JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'))}catch{return new Set()}}
function saveHistory(s){localStorage.setItem(HISTORY_KEY,JSON.stringify([...s]))}
function loadStatsData(){try{return JSON.parse(localStorage.getItem(STATS_KEY)||'{"answered":0,"correct":0}')}catch{return{answered:0,correct:0}}}
function showPage(id){document.querySelectorAll('main>section').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');scrollTo(0,0)}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(m){mode=m;showPage('quiz');nextQuestion()}
function available(){const h=loadHistory();return QUESTIONS.filter(q=>(mode==='すべて'||q.level===mode)&&!h.has(q.id))}
function nextQuestion(){
 locked=false;document.getElementById('answerArea').classList.add('hidden');document.getElementById('choices').innerHTML='';
 let pool=available();
 if(!pool.length){
   showPage('complete');
   return;
 }
 current=pool[Math.floor(Math.random()*pool.length)];
 const mixed=shuffle(current.choices.map((text,index)=>({text,index})));
 document.getElementById('levelPill').textContent=current.level;document.getElementById('catPill').textContent=current.category;
 document.getElementById('qno').textContent='Q. '+current.id.toUpperCase();
 document.getElementById('question').textContent=current.q;
 const total=QUESTIONS.filter(q=>mode==='すべて'||q.level===mode).length, remain=available().length;
 document.getElementById('progressText').textContent=`残り ${remain} / ${total}問`;
 mixed.forEach((c,n)=>{const b=document.createElement('button');b.className='choice';b.textContent=`${n+1}　${c.text}`;b.onclick=()=>answer(c.index,b);document.getElementById('choices').appendChild(b)})
}
function answer(index,btn){
 if(locked)return;locked=true;const ok=index===current.answer;
 [...document.querySelectorAll('.choice')].forEach(b=>b.disabled=true);btn.classList.add(ok?'correct':'wrong');
 const h=loadHistory();h.add(current.id);saveHistory(h);
 const s=loadStatsData();s.answered++;if(ok)s.correct++;localStorage.setItem(STATS_KEY,JSON.stringify(s));
 document.getElementById('mark').textContent=ok?'⭕️':'❌';document.getElementById('explain').innerHTML=`<strong>${ok?'正解！':'不正解'}</strong><br>${current.ex}`;
 document.getElementById('answerArea').classList.remove('hidden');
}

function resetAndRestart(){
  const h=loadHistory();
  const target=QUESTIONS.filter(q=>mode==='すべて'||q.level===mode);
  target.forEach(q=>h.delete(q.id));
  saveHistory(h);
  showPage('quiz');
  nextQuestion();
}

function showStats(){showPage('stats');const s=loadStatsData(),h=loadHistory(),rate=s.answered?Math.round(s.correct/s.answered*100):0;stAnswered.textContent=s.answered;stCorrect.textContent=s.correct;stRate.textContent=rate+'%';stBar.style.width=Math.min(100,h.size/QUESTIONS.length*100)+'%';stRemain.textContent=`未出題 ${Math.max(0,QUESTIONS.length-h.size)}問／全${QUESTIONS.length}問`;}
function resetHistory(){if(confirm('出題履歴と学習記録をリセットしますか？')){localStorage.removeItem(HISTORY_KEY);localStorage.removeItem(STATS_KEY);showStats()}}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js?v=162', {updateViaCache:'none'})
    .then(reg => reg.update())
    .catch(() => {});
}
showPage('home');
