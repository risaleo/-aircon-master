<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>エアコン販売マスター Ver.15</title>
<style>
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(160deg,#e5f3ff,#f8fbff);color:#17324d}
.app{max-width:680px;margin:auto;padding:12px} .card{background:#fff;border-radius:24px;padding:18px;min-height:calc(100vh - 24px);box-shadow:0 12px 35px #174f8220}
.hidden{display:none!important} .hero{background:linear-gradient(135deg,#0874c9,#0bb1ff);color:#fff;border-radius:22px;padding:20px;text-align:center}
.hero img{width:92px;height:92px;border-radius:21px} h1{font-size:27px;margin:8px 0 2px} .sub{opacity:.95;margin:0} .version{display:inline-block;background:#ffffff27;padding:6px 11px;border-radius:999px;margin-top:8px;font-weight:700}
.menu{display:grid;gap:11px;margin-top:15px} button{border:0;border-radius:16px;padding:15px;width:100%;font-size:17px;font-weight:800;background:#eaf5ff;color:#163c60;box-shadow:0 4px 10px #00000010}
button:active{transform:scale(.985)} .primary{background:#0068b7;color:white} .levelGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.top{display:flex;align-items:center;gap:10px;margin-bottom:12px} .back{width:44px;height:44px;padding:0;border-radius:50%} .top h2,.top p{margin:0}
.pills{display:flex;gap:7px;flex-wrap:wrap} .pill{padding:5px 10px;border-radius:999px;background:#eaf5ff;color:#0068b7;font-size:13px;font-weight:800}
.qno{font-weight:900;color:#0068b7;margin-top:16px} .question{font-size:22px;line-height:1.55;font-weight:800;margin:8px 0 16px}
.choices{display:grid;gap:10px} .choice{text-align:left;background:#f4f9fe;border:2px solid transparent} .choice.correct{background:#edfbee;border-color:#3eb767;color:#135b2e} .choice.wrong{background:#fff0f0;border-color:#e95858;color:#862222}
.resultMark{font-size:80px;text-align:center;line-height:1.1} .explain{margin-top:12px;border-radius:16px;padding:14px;background:#f6faff;line-height:1.7}
.next{margin-top:12px} .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0} .stat{background:#f4f9fe;border-radius:15px;padding:12px;text-align:center} .stat strong{display:block;font-size:24px;color:#0068b7}
.progressbar{height:10px;background:#e5eef6;border-radius:99px;overflow:hidden} .progressbar span{display:block;height:100%;background:#15a5ee}
.notice{margin-top:14px;padding:12px;background:#fff7dc;border-radius:14px;color:#715400;line-height:1.55;font-size:14px}
.listrow{display:flex;justify-content:space-between;gap:8px;padding:12px 0;border-bottom:1px solid #e6edf4} .section{color:#0068b7;margin:20px 0 6px}
.check{display:flex;gap:10px;padding:12px;background:#f5faff;border-radius:14px;margin:8px 0;line-height:1.5} .check input{transform:scale(1.25)}
.small{font-size:13px;color:#63788d} @media(max-width:430px){.app{padding:7px}.card{padding:14px;border-radius:18px}h1{font-size:23px}.question{font-size:20px}button{font-size:16px}}
</style>
</head>
<body><main class="app">
<section id="home" class="card">
<div class="hero"><img src="icon.svg" alt=""><h1>エアコン販売マスター</h1><p class="sub">Risa Edition</p><span class="version">Ver.15 重複防止版</span></div>
<div class="menu">
<button class="primary" onclick="startQuiz('すべて')">ランダム問題を始める</button>
<div class="levelGrid"><button onclick="startQuiz('初級')">初級</button><button onclick="startQuiz('中級')">中級</button><button onclick="startQuiz('上級')">上級</button></div>
<button onclick="showStats()">学習記録</button>
<button onclick="showPage('check')">工事聞き取りチェック</button>
<button onclick="showPage('prices')">主要工事料金一覧</button>
</div>
<div class="notice">同じ問題は、全問題を一巡するまで再出題されません。問題文と選択肢が同じ重複データも起動時に除外します。</div>
</section>

<section id="quiz" class="card hidden">
<div class="top"><button class="back" onclick="showPage('home')">←</button><div><h2>問題</h2><p id="progressText" class="small"></p></div></div>
<div class="pills"><span id="levelPill" class="pill"></span><span id="catPill" class="pill"></span></div>
<div id="qno" class="qno"></div><div id="question" class="question"></div><div id="choices" class="choices"></div>
<div id="answerArea" class="hidden"><div id="mark" class="resultMark"></div><div id="explain" class="explain"></div><button class="primary next" onclick="nextQuestion()">次の問題</button></div>
</section>

<section id="stats" class="card hidden">
<div class="top"><button class="back" onclick="showPage('home')">←</button><h2>学習記録</h2></div>
<div class="stats"><div class="stat"><strong id="stAnswered">0</strong>回答</div><div class="stat"><strong id="stCorrect">0</strong>正解</div><div class="stat"><strong id="stRate">0%</strong>正答率</div></div>
<div class="progressbar"><span id="stBar" style="width:0%"></span></div>
<p id="stRemain" class="small"></p>
<button class="primary" onclick="resetHistory()">出題履歴をリセット</button>
</section>

<section id="check" class="card hidden">
<div class="top"><button class="back" onclick="showPage('home')">←</button><h2>工事聞き取りチェック</h2></div>
<div id="checkList"></div><button class="primary" onclick="judgeCheck()">確認する</button><div id="checkResult" class="explain hidden"></div>
</section>

<section id="prices" class="card hidden">
<div class="top"><button class="back" onclick="showPage('home')">←</button><h2>主要工事料金一覧</h2></div><div id="priceList"></div>
<div class="notice">表示金額は税込の概算です。正式金額・施工可否は現地確認で確定してください。</div>
</section>
</main>

const RAW_QUESTIONS=[{"id": "b001", "level": "初級", "category": "基礎知識", "q": "APFは何を表す数値ですか？", "choices": ["年間を通した省エネ性能", "冷房能力だけ", "室外機の大きさ", "配管の長さ"], "answer": 0, "ex": "APFは通年エネルギー消費効率で、年間を通した省エネ性能の目安です。"}, {"id": "b002", "level": "初級", "category": "基礎知識", "q": "エアコンの「2.2kW」は一般に何畳用の目安ですか？", "choices": ["6畳", "8畳", "10畳", "14畳"], "answer": 0, "ex": "2.2kWは一般に主として6畳用の目安です。建物条件で必要能力は変わります。"}, {"id": "b003", "level": "初級", "category": "基礎知識", "q": "エアコン専用回路とは何ですか？", "choices": ["エアコンだけに使う回路", "照明と共用する回路", "テレビ用の回路", "屋外専用の回路"], "answer": 0, "ex": "エアコンだけに使用する専用の電気回路です。"}, {"id": "b004", "level": "初級", "category": "基礎知識", "q": "室内機から出た結露水を外へ流す部材はどれですか？", "choices": ["ドレンホース", "冷媒管", "VVFケーブル", "アース線"], "answer": 0, "ex": "ドレンホースが室内機の結露水を屋外へ排出します。"}, {"id": "b005", "level": "初級", "category": "基礎知識", "q": "冷媒配管の主な役割はどれですか？", "choices": ["室内機と室外機の間で冷媒を循環させる", "結露水を排出する", "電源を供給する", "室外機を固定する"], "answer": 0, "ex": "冷媒配管は室内機と室外機の間で冷媒を循環させます。"}, {"id": "b006", "level": "初級", "category": "基礎知識", "q": "買い替え工事で最初に確認したい内容はどれですか？", "choices": ["既設エアコンの取り外し有無", "テレビのサイズ", "冷蔵庫の容量", "Wi-Fiの速度"], "answer": 0, "ex": "既設機の取り外し、リサイクル、設置状況を確認します。"}, {"id": "b007", "level": "初級", "category": "電気", "q": "100V機から200V機へ変更する際、確認が必要なものはどれですか？", "choices": ["電圧切替とコンセント形状", "ドレンホースの色", "リモコンの電池", "室内機の色"], "answer": 0, "ex": "分電盤側の電圧切替と、対応するコンセントへの交換が必要になる場合があります。"}, {"id": "b008", "level": "初級", "category": "電気", "q": "アースの主な目的はどれですか？", "choices": ["漏電時の感電リスクを抑える", "冷房能力を上げる", "運転音を下げる", "通信速度を上げる"], "answer": 0, "ex": "漏電時に電気を逃がし、感電などのリスクを抑えるためです。"}, {"id": "b009", "level": "初級", "category": "工事", "q": "室外機を地面やベランダへ通常設置する方法はどれですか？", "choices": ["平地置き", "壁面置き", "天吊り", "屋根置き"], "answer": 0, "ex": "地面やベランダへの通常設置は平地置きです。"}, {"id": "b010", "level": "初級", "category": "工事", "q": "配管を見た目よく保護する部材はどれですか？", "choices": ["化粧カバー", "分配器", "アンテナ線", "排気ダクト"], "answer": 0, "ex": "配管化粧カバーは配管を保護し、見た目も整えます。"}, {"id": "b011", "level": "初級", "category": "接客", "q": "工事料金を案内する際、最も適切な説明はどれですか？", "choices": ["現場状況で追加工事が変わるため概算と伝える", "必ず表示金額だけで終わると断言する", "追加料金は絶対にないと伝える", "工事内容を確認せず金額だけ伝える"], "answer": 0, "ex": "店頭では概算案内とし、最終金額は現地確認で決まることを伝えます。"}, {"id": "b012", "level": "初級", "category": "接客", "q": "室外機の設置場所として確認すべき内容はどれですか？", "choices": ["地面・ベランダ・屋根・壁面など", "壁紙の色だけ", "カーテンの柄", "テレビ台の高さ"], "answer": 0, "ex": "設置方法によって追加工事や施工可否が変わります。"}, {"id": "b013", "level": "初級", "category": "安全", "q": "高所作業の可能性がある場合の対応はどれですか？", "choices": ["事前に設置状況と作業スペースを確認する", "当日まで確認しない", "料金を必ず無料にする", "脚立だけで必ず施工できると伝える"], "answer": 0, "ex": "安全な作業スペースやハシゴ設置場所を事前に確認します。"}, {"id": "b014", "level": "初級", "category": "工事", "q": "隠ぺい配管とはどのような配管ですか？", "choices": ["壁や天井内部を通る配管", "室外機の上に置く配管", "窓から垂らすだけの配管", "排水だけの配管"], "answer": 0, "ex": "壁や天井内にあらかじめ埋設された配管です。"}, {"id": "b015", "level": "初級", "category": "接客", "q": "新規穴あけの可能性がある時に確認したい建物情報はどれですか？", "choices": ["着工年月日", "郵便受けの色", "テレビのメーカー", "家族の人数だけ"], "answer": 0, "ex": "石綿事前調査の要否判断に建物の着工年月日が重要です。"}, {"id": "i001", "level": "中級", "category": "工事料金", "q": "2.2～3.6kWの新規標準工事料金はいくらですか？", "choices": ["20,350円", "24,750円", "28,050円", "19,800円"], "answer": 0, "ex": "料金表Ver.26.04.29では税込20,350円です。"}, {"id": "i002", "level": "中級", "category": "工事料金", "q": "4.0～5.6kWの新規標準工事料金はいくらですか？", "choices": ["24,750円", "20,350円", "28,050円", "36,300円"], "answer": 0, "ex": "料金表Ver.26.04.29では税込24,750円です。"}, {"id": "i003", "level": "中級", "category": "工事料金", "q": "6.3kW以上の新規標準工事料金はいくらですか？", "choices": ["28,050円", "24,750円", "20,350円", "19,800円"], "answer": 0, "ex": "料金表Ver.26.04.29では税込28,050円です。"}, {"id": "i004", "level": "中級", "category": "工事料金", "q": "内機2階・外機1階取付の料金はいくらですか？", "choices": ["19,800円", "36,300円", "11,000円", "8,800円"], "answer": 0, "ex": "税込19,800円です。"}, {"id": "i005", "level": "中級", "category": "工事料金", "q": "内機3階・外機1階取付の料金はいくらですか？", "choices": ["36,300円", "19,800円", "20,900円", "15,400円"], "answer": 0, "ex": "税込36,300円です。"}, {"id": "i006", "level": "中級", "category": "工事料金", "q": "隠ぺい配管工事の料金はいくらですか？", "choices": ["8,800円", "7,700円", "6,600円", "9,900円"], "answer": 0, "ex": "税 const HISTORY_KEY='aircon_v15_history', STATS_KEY='aircon_v15_stats';
function norm(v){return String(v??'').normalize('NFKC').replace(/\s+/g,'').replace(/[。、・,.!?！？「」『』（）()［］\[\]]/g,'').toLowerCase()}
function dedupe(list){const ids=new Set(), fps=new Set();return list.filter((q,i)=>{const id=String(q.id||i),f=[norm(q.q),...q.choices.map(norm).sort()].join('|');if(ids.has(id)||fps.has(f))return false;ids.add(id);fps.add(f);return true})}
const QUESTIONS=dedupe(RAW_QUESTIONS);
let mode='すべて', current=null, locked=false;
function loadHistory(){try{return new Set(JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'))}catch{return new Set()}}
function saveHistory(s){localStorage.setItem(HISTORY_KEY,JSON.stringify([...s]))}
function loadStatsData(){try{return JSON.parse(localStorage.getItem(STATS_KEY)||'{"answered":0,"correct":0}')}catch{return{answered:0,correct:0}}}
function showPage(id){document.querySelectorAll('main>section').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');if(id==='check')renderCheck();if(id==='prices')renderPrices();scrollTo(0,0)}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(m){mode=m;showPage('quiz');nextQuestion()}
function available(){const h=loadHistory();return QUESTIONS.filter(q=>(mode==='すべて'||q.level===mode)&&!h.has(q.id))}
function nextQuestion(){
 locked=false;document.getElementById('answerArea').classList.add('hidden');document.getElementById('choices').innerHTML='';
 let pool=available();
 if(!pool.length){
   const allForMode=QUESTIONS.filter(q=>mode==='すべて'||q.level===mode);
   const h=loadHistory(); allForMode.forEach(q=>h.delete(q.id)); saveHistory(h); pool=available();
   alert('このコースの問題をすべて解き終えました。出題履歴をリセットして最初から始めます。');
 }
 current=pool[Math.floor(Math.random()*pool.length)];
 const mixed=shuffle(current.choices.map((text,index)=>({text,index})));
 document.getElementById('levelPill').textContent=current.level;document.getElementById('catPill').textContent=current.category;
 document.getElementById('qno').textContent='Q. '+current.id.toUpperCase();
 document.getElementById('question').textContent=current.q;
 const total=QUESTIONS.filter(q=>mode==='すべて'||q.level===mode).length, remain=available().length;
 document.getElementById('progressText').textContent=`残り ${remain} / ${total}問`;
 mixed.forEach((c,n)=>{const b=document.createElement('button');b.className='choice';b.textContent=`${n+1}　${c.text}`;b.onclick=()=>answer(c.index,b);document.getElementById('choices').appendChild(b)})
}
function answer(index,btn){
 if(locked)return;locked=true;const ok=index===current.answer;
 [...document.querySelectorAll('.choice')].forEach(b=>b.disabled=true);btn.classList.add(ok?'correct':'wrong');
 const h=loadHistory();h.add(current.id);saveHistory(h);
 const s=loadStatsData();s.answered++;if(ok)s.correct++;localStorage.setItem(STATS_KEY,JSON.stringify(s));
 document.getElementById('mark').textContent=ok?'⭕️':'❌';document.getElementById('explain').innerHTML=`<strong>${ok?'正解！':'不正解'}</strong><br>${current.ex}`;
 document.getElementById('answerArea').classList.remove('hidden');
}
function showStats(){showPage('stats');const s=loadStatsData(),h=loadHistory(),rate=s.answered?Math.round(s.correct/s.answered*100):0;stAnswered.textContent=s.answered;stCorrect.textContent=s.correct;stRate.textContent=rate+'%';stBar.style.width=Math.min(100,h.size/QUESTIONS.length*100)+'%';stRemain.textContent=`未出題 ${Math.max(0,QUESTIONS.length-h.size)}問／全${QUESTIONS.length}問`;}
function resetHistory(){if(confirm('出題履歴と学習記録をリセットしますか？')){localStorage.removeItem(HISTORY_KEY);localStorage.removeItem(STATS_KEY);showStats()}}
