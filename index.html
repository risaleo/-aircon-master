<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0068b7">
<link rel="manifest" href="manifest.json?v=204">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png?v=204">
<title>エアコン販買マスター Ver.20.4</title>
<style>
:root{
  --navy:#0d2d54;
  --blue:#0677e8;
  --sky:#22b7f4;
  --pale:#edf7ff;
  --white:#ffffff;
  --green:#22b96f;
  --purple:#8955e8;
  --orange:#f4a321;
  --shadow:0 12px 30px rgba(25,91,145,.13);
}
*{box-sizing:border-box}
html{background:#eef7ff}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  color:var(--navy);
  background:
    radial-gradient(circle at 10% 5%,rgba(34,183,244,.18),transparent 25%),
    radial-gradient(circle at 90% 15%,rgba(137,85,232,.10),transparent 23%),
    linear-gradient(180deg,#f8fcff 0%,#edf7ff 100%);
}
button{font:inherit;-webkit-tap-highlight-color:transparent}
.app{max-width:720px;margin:auto;padding:10px}
.card{
  min-height:calc(100vh - 20px);
  background:rgba(255,255,255,.93);
  border:1px solid rgba(255,255,255,.8);
  border-radius:30px;
  padding:16px;
  box-shadow:0 18px 45px rgba(18,78,126,.14);
  backdrop-filter:blur(12px);
}
.hidden{display:none!important}

/* ホーム */
.hero{
  position:relative;
  overflow:hidden;
  min-height:310px;
  border-radius:26px;
  padding:27px 22px 24px;
  text-align:left;
  color:var(--navy);
  background:
    linear-gradient(135deg,rgba(255,255,255,.98),rgba(226,246,255,.92)),
    linear-gradient(135deg,#fff,#dff4ff);
  box-shadow:inset 0 0 0 1px rgba(8,119,232,.08);
}
.hero::before{
  content:"";
  position:absolute;
  width:290px;height:290px;border-radius:50%;
  top:-145px;left:-85px;
  background:linear-gradient(135deg,rgba(31,181,244,.32),rgba(6,119,232,.08));
}
.hero::after{
  content:"❄";
  position:absolute;
  right:24px;top:92px;
  font-size:58px;
  color:rgba(25,164,235,.22);
  transform:rotate(12deg);
}
.hero-ac{
  position:absolute;
  right:20px;top:24px;
  width:185px;height:62px;border-radius:14px;
  background:linear-gradient(180deg,#fff,#eaf4fb);
  box-shadow:0 12px 24px rgba(23,72,109,.18);
  border:1px solid #e7f0f6;
}
.hero-ac::before{
  content:"";
  position:absolute;left:18px;right:18px;bottom:10px;height:8px;
  border-radius:6px;background:#b9d4e8;
}
.hero-ac::after{
  content:"";
  position:absolute;right:18px;top:16px;width:7px;height:7px;
  border-radius:50%;background:#2ca7eb;
}
.cool-air{
  position:absolute;right:45px;top:79px;width:125px;height:72px;
  background:repeating-linear-gradient(110deg,transparent 0 13px,rgba(31,181,244,.22) 14px 19px,transparent 20px 31px);
  filter:blur(1px);
  transform:skewX(-8deg);
}
.hero-brand{
  position:relative;z-index:2;
  display:flex;align-items:center;gap:12px;
  margin-top:14px;
}
.hero img{
  width:76px;height:76px;border-radius:22px;
  box-shadow:0 12px 26px rgba(6,119,232,.22);
}
.hero-copy{position:relative;z-index:2;margin-top:30px;max-width:470px}
.hero h1{
  margin:0;
  font-size:clamp(30px,7vw,48px);
  line-height:1.13;
  letter-spacing:.01em;
  font-weight:950;
  text-shadow:0 3px 0 #fff;
}
.hero h1 span{display:block;color:var(--blue)}
.sub{
  margin:12px 0 0;
  color:#397197;
  font-size:16px;
  font-weight:700;
}
.version{
  display:inline-flex;
  align-items:center;
  gap:7px;
  margin-top:14px;
  padding:7px 13px;
  border-radius:999px;
  background:linear-gradient(135deg,#fff6c8,#ffe18b);
  color:#7d5b00;
  font-size:13px;
  font-weight:900;
  box-shadow:0 6px 16px rgba(230,172,20,.17);
}
.version::before{content:"★";color:#f4ae00}

/* メニュー */
.menu{display:grid;gap:12px;margin-top:14px}
button{
  border:0;
  border-radius:19px;
  padding:16px;
  width:100%;
  font-size:17px;
  font-weight:900;
  color:var(--navy);
  background:#fff;
  box-shadow:var(--shadow);
  transition:.16s ease;
}
button:active{transform:scale(.98)}
.primary{
  position:relative;
  min-height:96px;
  padding:17px 62px 17px 74px;
  text-align:left;
  color:#fff;
  background:linear-gradient(135deg,#0aa2f0,#0468d9 75%);
  overflow:hidden;
}
.primary::before{
  content:"?";
  position:absolute;left:18px;top:20px;
  width:48px;height:48px;border-radius:50%;
  display:grid;place-items:center;
  color:#096edb;background:#fff;
  font-size:29px;font-weight:950;
}
.primary::after{
  content:"›";
  position:absolute;right:18px;top:25px;
  width:45px;height:45px;border-radius:50%;
  display:grid;place-items:center;
  background:rgba(255,255,255,.22);
  font-size:38px;line-height:1;
}
.levelGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.levelGrid button{
  min-height:126px;
  padding:18px 8px 12px;
  font-size:20px;
  background:#fff;
}
.levelGrid button:nth-child(1){color:var(--green);background:linear-gradient(180deg,#fff,#edfff5)}
.levelGrid button:nth-child(2){color:var(--blue);background:linear-gradient(180deg,#fff,#eef7ff)}
.levelGrid button:nth-child(3){color:var(--purple);background:linear-gradient(180deg,#fff,#f6efff)}
.levelGrid button::before{
  display:block;margin:0 auto 8px;
  width:45px;height:45px;border-radius:50%;
  font-size:26px;line-height:45px;
}
.levelGrid button:nth-child(1)::before{content:"🌱";background:#daf8e8}
.levelGrid button:nth-child(2)::before{content:"📊";background:#dceeff}
.levelGrid button:nth-child(3)::before{content:"👑";background:#efe2ff}

.menu-action{
  position:relative;
  min-height:82px;
  padding:15px 55px 15px 78px;
  text-align:left;
  background:linear-gradient(90deg,#fff,#f8fbff);
}
.menu-action::before{
  position:absolute;left:16px;top:14px;
  width:52px;height:52px;border-radius:16px;
  display:grid;place-items:center;
  font-size:27px;color:#fff;
  box-shadow:0 8px 16px rgba(23,102,174,.18);
}
.menu-action::after{
  content:"›";
  position:absolute;right:20px;top:21px;
  font-size:33px;color:#6f8498;
}
.menu-action.record::before{content:"📖";background:linear-gradient(135deg,#1eb0ff,#0869d8)}


.menu-action small{display:block;margin-top:5px;color:#75889a;font-size:13px;font-weight:700}

.notice{
  position:relative;
  margin-top:14px;
  padding:17px 15px 17px 58px;
  border-radius:19px;
  color:#295578;
  line-height:1.65;
  font-size:14px;
  background:linear-gradient(135deg,#e7f5ff,#f5faff);
  border:1px solid #dbeefe;
}
.notice::before{
  content:"🛡️";
  position:absolute;left:16px;top:18px;font-size:28px;
}

/* 共通画面 */
.top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back{width:44px;height:44px;padding:0;border-radius:50%;box-shadow:none;background:#edf6fd;color:#106eb7}
.top h2,.top p{margin:0}
.pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{padding:6px 11px;border-radius:999px;background:#eaf5ff;color:#076fca;font-size:13px;font-weight:900}
.qno{font-weight:950;color:#0578dc;margin-top:18px}
.question{font-size:22px;line-height:1.55;font-weight:900;margin:8px 0 16px}
.choices{display:grid;gap:11px}
.choice{text-align:left;background:#f7fbff;border:2px solid #e7f1f9;box-shadow:none}
.choice.correct{background:#edfbee;border-color:#3eb767;color:#135b2e}
.choice.wrong{background:#fff0f0;border-color:#e95858;color:#862222}
.resultMark{font-size:80px;text-align:center;line-height:1.1}
.explain{margin-top:12px;border-radius:17px;padding:15px;background:#f4f9fe;line-height:1.7}
.next{margin-top:12px;min-height:auto;text-align:center;padding:15px}
.next::before,.next::after{display:none}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.stat{background:#f4f9fe;border-radius:16px;padding:12px;text-align:center}
.stat strong{display:block;font-size:25px;color:#0876d4}
.progressbar{height:11px;background:#e5eef6;border-radius:99px;overflow:hidden}
.progressbar span{display:block;height:100%;background:linear-gradient(90deg,#12b8f5,#0468d9)}




.small{font-size:13px;color:#63788d}

@media(max-width:520px){
  .app{padding:6px}
  .card{padding:12px;border-radius:22px}
  .hero{min-height:286px;padding:22px 17px}
  .hero-ac{width:150px;height:52px;right:15px}
  .cool-air{right:30px;top:69px}
  .hero img{width:65px;height:65px}
  .hero-copy{margin-top:32px}
  .hero h1{font-size:34px}
  .primary{font-size:18px}
  .levelGrid button{font-size:18px}
}

:root{
  --deep:#0b2447;
  --blue:#0b79e5;
  --cyan:#22c1f1;
  --ice:#eef8ff;
  --silver:#dce8f2;
  --gold:#ffd466;
}
body{
  background:
    radial-gradient(circle at 8% 5%,rgba(41,190,242,.22),transparent 23%),
    radial-gradient(circle at 92% 6%,rgba(119,96,255,.15),transparent 18%),
    linear-gradient(180deg,#edf8ff 0%,#f8fbff 45%,#e9f3fb 100%);
}
.card{
  background:rgba(255,255,255,.92);
  border:1px solid rgba(255,255,255,.8);
  backdrop-filter:blur(16px);
}
.hero{
  min-height:355px;
  background:
    linear-gradient(135deg,rgba(255,255,255,.98),rgba(220,244,255,.94)),
    linear-gradient(135deg,#fff,#dff5ff);
}
.hero-copy{max-width:560px}
.hero-title-main{
  display:block;
  color:var(--deep);
  font-size:clamp(31px,7.5vw,52px);
  line-height:1.08;
  font-weight:950;
  letter-spacing:.01em;
}
.risa-script{
  display:inline-block;
  margin-top:12px;
  padding:3px 14px 5px;
  font-family:"Snell Roundhand","Segoe Script","Brush Script MT",cursive;
  font-size:clamp(25px,6vw,42px);
  font-style:italic;
  font-weight:700;
  letter-spacing:.04em;
  color:#71859a;
  text-shadow:0 2px 0 #fff,0 5px 14px rgba(46,78,107,.18);
  transform:rotate(-5deg);
}
.hero-tagline{
  margin:18px 0 0;
  font-size:17px;
  color:#315f83;
  font-weight:800;
}

.dashboard{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:10px;
  margin-top:14px;
}
.dash-card{
  border-radius:19px;
  padding:15px;
  background:linear-gradient(135deg,#fff,#f1f8fe);
  box-shadow:var(--shadow);
}
.dash-card strong{display:block;font-size:25px;color:var(--blue)}
.exp-track{height:9px;background:#dfebf4;border-radius:99px;overflow:hidden;margin-top:9px}
.exp-track span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--blue))}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.home-tile{
  min-height:108px;
  padding:16px;
  text-align:left;
  position:relative;
  overflow:hidden;
}
.home-tile b{display:block;font-size:18px;margin-bottom:5px}
.home-tile small{color:#6b8095;font-weight:700}
.home-tile::after{
  position:absolute;
  right:14px;bottom:8px;
  font-size:38px;
  opacity:.18;
}
.tile-quiz::after{content:"📝"}
.tile-daily::after{content:"🎯"}
.tile-sales::after{content:"🛒"}
.tile-stats::after{content:"📊"}
.tile-review::after{content:"🔁"}
.tile-reset::after{content:"⚙️"}
.rank-pill{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:7px 11px;
  border-radius:999px;
  background:#eaf5ff;
  color:#0a66b8;
  font-weight:900;
  font-size:13px;
}
.sales-case{
  border-radius:20px;
  padding:16px;
  background:linear-gradient(135deg,#f7fbff,#edf7ff);
  border:1px solid #dbeaf6;
  margin-bottom:13px;
}
.sales-case h3{margin:0 0 8px;color:#0b67b6}
.sales-options{display:grid;gap:9px}
.sales-step{font-size:13px;font-weight:900;color:#0a70c9;margin:12px 0 5px}
.score-ring{
  width:132px;height:132px;border-radius:50%;
  display:grid;place-items:center;
  margin:18px auto;
  background:conic-gradient(var(--blue) calc(var(--score)*1%),#dbe8f2 0);
  position:relative;
}
.score-ring::before{
  content:"";
  position:absolute;inset:12px;border-radius:50%;background:#fff;
}
.score-ring strong{position:relative;font-size:29px;color:var(--deep)}
.category-bars{display:grid;gap:10px}
.category-row{display:grid;grid-template-columns:110px 1fr 45px;gap:8px;align-items:center;font-size:13px;font-weight:800}
.category-bar{height:9px;background:#e4edf5;border-radius:99px;overflow:hidden}
.category-bar span{display:block;height:100%;background:linear-gradient(90deg,#2cc7ef,#0b79e5)}
@media(max-width:520px){
  .dashboard{grid-template-columns:1fr 1fr}
  .hero{min-height:330px}
  .home-grid{grid-template-columns:1fr 1fr}
  .home-tile{min-height:100px;padding:14px}
}


/* Ver.20.4 メニュー修正 */
.home-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:11px;
  margin-top:14px;
}
.home-tile{
  width:100%;
  min-width:0;
  min-height:112px;
  padding:17px 15px;
  border-radius:20px;
  text-align:left;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  overflow:hidden;
  background:linear-gradient(145deg,#ffffff,#f1f8fe);
  color:var(--navy);
  box-shadow:0 10px 25px rgba(25,91,145,.12);
}
.home-tile::before{display:none!important}
.home-tile::after{
  position:absolute;
  right:12px;
  bottom:8px;
  font-size:36px;
  opacity:.16;
  display:block!important;
  width:auto!important;
  height:auto!important;
  background:none!important;
}
.home-tile b{position:relative;z-index:2}
.home-tile small{position:relative;z-index:2}
.tile-featured{
  color:#fff;
  background:linear-gradient(135deg,#08a9ef,#0869d8);
}
.tile-featured small{color:rgba(255,255,255,.82)}
.tile-featured::after{opacity:.26}
#levelMenu{
  margin-top:12px;
  padding:12px;
  border-radius:20px;
  background:#f3f9fe;
  border:1px solid #dcebf6;
}
#levelMenu .primary{
  min-height:auto;
  padding:15px;
  text-align:center;
}
#levelMenu .primary::before,
#levelMenu .primary::after{display:none!important}
@media(max-width:390px){
  .home-grid{grid-template-columns:1fr}
  .home-tile{min-height:88px}
}


/* iPad optimized */
.app,.container,main{
  max-width:1100px!important;
  margin:0 auto!important;
}
.hero{min-height:420px!important}
.hero-title-main{font-size:56px!important}
.risa-script{font-size:44px!important}
.home-grid{
 display:grid!important;
 grid-template-columns:repeat(3,minmax(220px,1fr))!important;
 gap:18px!important;
}
.home-tile{min-height:150px!important}
.card{padding:24px!important}
.question{font-size:1.3rem!important}
.choice{
 min-height:68px!important;
 font-size:1.08rem!important;
}
@media (max-width:1024px){
 .home-grid{grid-template-columns:repeat(2,1fr)!important;}
}
@media (max-width:700px){
 .hero-title-main{font-size:40px!important}
 .risa-script{font-size:32px!important}
 .home-grid{grid-template-columns:1fr!important;}
}

</style>
</head>
<body><main class="app">


<section id="home" class="card">
  <div class="hero">
    <div class="hero-ac"></div>
    <div class="cool-air"></div>
    <div class="hero-copy">
      <span class="hero-title-main">❄ エアコン販買マスター</span>
      <span class="risa-script">RISA EDITION</span>
      <p class="hero-tagline">知識を、提案力へ。</p>
      
    </div>
  </div>

  <div class="dashboard">
    <div class="dash-card">
      <span class="small">現在のランク</span>
      <strong id="homeRank">Rookie</strong>
      <span id="homeExpText" class="small">0 EXP</span>
      <div class="exp-track"><span id="homeExpBar" style="width:0%"></span></div>
    </div>
    <div class="dash-card">
      <span class="small">総合正答率</span>
      <strong id="homeRate">0%</strong>
      <span id="homeAnswered" class="small">回答 0問</span>
    </div>
  </div>

  <div class="home-grid">
    <button class="home-tile tile-daily tile-featured" onclick="startDaily()">
      <b>今日のチャレンジ</b>
      <small>毎日10問</small>
    </button>
    <button class="home-tile tile-quiz" onclick="showLevelMenu()">
      <b>練習問題</b>
      <small>初級・中級・上級</small>
    </button>
    <button class="home-tile tile-sales" onclick="startSalesMode()">
      <b>販買モード</b>
      <small>接客を実践練習</small>
    </button>
    <button class="home-tile tile-stats" onclick="showStats()">
      <b>成績</b>
      <small>苦手分野を確認</small>
    </button>
    <button class="home-tile tile-review" onclick="startWrongReview()">
      <b>間違い復習</b>
      <small>苦手だけ再挑戦</small>
    </button>
    <button class="home-tile tile-reset" onclick="resetHistory()">
      <b>設定</b>
      <small>学習記録をリセット</small>
    </button>
  </div>

  <div id="levelMenu" class="menu hidden">
    <button class="primary next" onclick="startQuiz('すべて')">ランダム</button>
    <div class="levelGrid">
      <button onclick="startQuiz('初級')">初級</button>
      <button onclick="startQuiz('中級')">中級</button>
      <button onclick="startQuiz('上級')">上級</button>
    </div>
  </div>

  <div class="notice">
    <strong>全180問・ランク別精査済み</strong><br>
    工事、料金、電気、メーカー提案、接客を総合的に学べます。正解位置は①〜④に均等配置されます。
  </div>
</section>

<section id="quiz" class="card hidden">
<div class="top"><button class="back" onclick="showPage('home')">←</button><div><h2>問題</h2><p id="progressText" class="small"></p></div></div>
<div class="pills"><span id="levelPill" class="pill"></span><span id="catPill" class="pill"></span></div>
<div id="qno" class="qno"></div><div id="question" class="question"></div><div id="choices" class="choices"></div>
<div id="answerArea" class="hidden"><div id="mark" class="resultMark"></div><div id="explain" class="explain"></div><button class="primary next" onclick="nextQuestion()">次の問題</button></div>
</section>


<section id="complete" class="card hidden">
  <div class="top">
    <button class="back" onclick="showPage('home')">←</button>
    <h2>全問題クリア</h2>
  </div>
  <div style="text-align:center;padding:30px 10px">
    <div style="font-size:88px;line-height:1">🏆</div>
    <h2 style="font-size:28px;margin:14px 0 8px">全180問を解き終えました！</h2>
    <p style="line-height:1.8;color:#5f7488">
      同じ問題を自動で繰り返さないように停止しています。<br>
      もう一度解く場合だけ、下のボタンで履歴をリセットしてください。
    </p>
    <button class="primary next" onclick="resetAndRestart()">最初からもう一度</button>
    <button style="margin-top:10px" onclick="showPage('home')">ホームへ戻る</button>
  </div>
</section>



<section id="sales" class="card hidden">
  <div class="top">
    <button class="back" onclick="showPage('home')">←</button>
    <div><h2>販買モード</h2><p class="small">お客様に合う提案を考えよう</p></div>
  </div>
  <div id="salesCase" class="sales-case"></div>
  <div id="salesStepLabel" class="sales-step"></div>
  <div id="salesOptions" class="sales-options"></div>
  <div id="salesResult" class="hidden"></div>
</section>

<section id="stats" class="card hidden">
  <div class="top"><button class="back" onclick="showPage('home')">←</button><h2>成績</h2></div>
  <div class="score-ring" id="scoreRing" style="--score:0"><strong id="stRate">0%</strong></div>
  <div class="stats">

const HISTORY_KEY='aircon_v15_history', STATS_KEY='aircon_v15_stats';
function norm(v){return String(v??'').normalize('NFKC').replace(/\s+/g,'').replace(/[。、・,.!?！？「」『』（）()［］\[\]]/g,'').toLowerCase()}
function dedupe(list){const ids=new Set(), fps=new Set();return list.filter((q,i)=>{const id=String(q.id||i),f=[norm(q.q),...q.choices.map(norm).sort()].join('|');if(ids.has(id)||fps.has(f))return false;ids.add(id);fps.add(f);return true})}
const QUESTIONS=dedupe(RAW_QUESTIONS);
let mode='すべて', current=null, locked=false;
function loadHistory(){try{return new Set(JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'))}catch{return new Set()}}
function saveHistory(s){localStorage.setItem(HISTORY_KEY,JSON.stringify([...s]))}
function loadStatsData(){try{return JSON.parse(localStorage.getItem(STATS_KEY)||'{"answered":0,"correct":0}')}catch{return{answered:0,correct:0}}}
function showPage(id){document.querySelectorAll('main>section').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');scrollTo(0,0)}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let answerPositionBag=[];
let lastAnswerPosition=-1;

function nextBalancedPosition(choiceCount=4){
  if(choiceCount<=1)return 0;

  if(answerPositionBag.length===0){
    answerPositionBag=shuffle([...Array(choiceCount).keys()]);
    if(answerPositionBag[0]===lastAnswerPosition && answerPositionBag.length>1){
      [answerPositionBag[0],answerPositionBag[1]]=[answerPositionBag[1],answerPositionBag[0]];
    }
  }

  const position=answerPositionBag.shift();
  lastAnswerPosition=position;
  return position;
}

function arrangeChoicesAtBalancedPosition(choices,correctIndex){
  const correct={text:choices[correctIndex],index:correctIndex};
  const wrong=shuffle(
    choices.map((text,index)=>({text,index})).filter(item=>item.index!==correctIndex)
  );
  const target=nextBalancedPosition(choices.length);
  const arranged=[...wrong];
  arranged.splice(target,0,correct);
  return arranged;
}
function startQuiz(m){mode=m;showPage('quiz');nextQuestion()}
function available(){const h=loadHistory();return QUESTIONS.filter(q=>(mode==='すべて'||q.level===mode)&&!h.has(q.id))}
function nextQuestion(){
 locked=false;document.getElementById('answerArea').classList.add('hidden');document.getElementById('choices').innerHTML='';
 let pool=available();
 if(!pool.length){
   showPage('complete');
   return;
 }
 current=pool[Math.floor(Math.random()*pool.length)];
 const mixed=arrangeChoicesAtBalancedPosition(current.choices,current.answer);
 document.getElementById('levelPill').textContent=current.level;document.getElementById('catPill').textContent=current.category;
 document.getElementById('qno').textContent='Q. '+current.id.toUpperCase();
 document.getElementById('question').textContent=current.q;
 const total=QUESTIONS.filter(q=>mode==='すべて'||q.level===mode).length, remain=available().length;
 document.getElementById('progressText').textContent=`残り ${remain} / ${total}問`;
 mixed.forEach((c,n)=>{const b=document.createElement('button');b.className='choice';b.textContent=`${n+1}　${c.text}`;b.onclick=()=>answer(c.index,b);document.getElementById('choices').appendChild(b)})
}
function answer(index,btn){
 if(locked)return;locked=true;const ok=index===current.answer;
 [...document.querySelectorAll('.choice')].forEach(b=>b.disabled=true);btn.classList.add(ok?'correct':'wrong');
 const h=loadHistory();h.add(current.id);saveHistory(h);
 const s=loadStatsData();s.answered++;if(ok)s.correct++;localStorage.setItem(STATS_KEY,JSON.stringify(s));
 document.getElementById('mark').textContent=ok?'⭕️':'❌';document.getElementById('explain').innerHTML=`<strong>${ok?'正解！':'不正解'}</strong><br>${current.ex}`;
 document.getElementById('answerArea').classList.remove('hidden');
}

function resetAndRestart(){
  const h=loadHistory();
  const target=QUESTIONS.filter(q=>mode==='すべて'||q.level===mode);
  target.forEach(q=>h.delete(q.id));
  saveHistory(h);
  showPage('quiz');
  nextQuestion();
}

function showStats(){
  showPage('stats');
  const s=loadStatsData(),h=loadHistory(),rate=s.answered?Math.round(s.correct/s.answered*100):0;
  stAnswered.textContent=s.answered;stCorrect.textContent=s.correct;stRate.textContent=rate+'%';
  stRank.textContent=getRank(s.correct*10);
  scoreRing.style.setProperty('--score',rate);
  stRemain.textContent=`未出題 ${Math.max(0,QUESTIONS.length-h.size)}問／全${QUESTIONS.length}問`;
  const cats=JSON.parse(localStorage.getItem(CAT_KEY)||'{}');
  categoryStats.innerHTML='';
  const groups={};
  Object.entries(cats).forEach(([k,v])=>{
    let g=k.includes('料金')?'料金':k.includes('電気')?'電気':k.includes('メーカー')?'メーカー':k.includes('接客')?'接客':'工事・基礎';
    if(!groups[g])groups[g]={answered:0,correct:0};
    groups[g].answered+=v.answered;groups[g].correct+=v.correct;
  });
  ['工事・基礎','料金','電気','メーカー','接客'].forEach(g=>{
    const v=groups[g]||{answered:0,correct:0};
    const r=v.answered?Math.round(v.correct/v.answered*100):0;
    const row=document.createElement('div');row.className='category-row';
    row.innerHTML=`<span>${g}</span><div class="category-bar"><span style="width:${r}%"></span></div><span>${r}%</span>`;
    categoryStats.appendChild(row);
  });
}

const WRONG_KEY='aircon_complete_wrong';
const CAT_KEY='aircon_complete_category';
let quizLimit=null, quizAnsweredThisRun=0, reviewMode=false;

function getRank(exp){
  if(exp>=1500) return '👑 販買マスター';
  if(exp>=900) return '💎 Platinum';
  if(exp>=500) return '🥇 Gold';
  if(exp>=250) return '🥈 Silver';
  if(exp>=100) return '🥉 Bronze';
  return '🔰 Rookie';
}
function updateHome(){
  const s=loadStatsData();
  const exp=s.correct*10;
  const rate=s.answered?Math.round(s.correct/s.answered*100):0;
  homeRank.textContent=getRank(exp);
  homeRate.textContent=rate+'%';
  homeAnswered.textContent='回答 '+s.answered+'問';
  homeExpText.textContent=exp+' EXP';
  const tier=exp<100?100:exp<250?250:exp<500?500:exp<900?900:exp<1500?1500:2000;
  homeExpBar.style.width=Math.min(100,exp/tier*100)+'%';
}
function showLevelMenu(){
  levelMenu.classList.toggle('hidden');
}
function startDaily(){
  quizLimit=10; quizAnsweredThisRun=0; reviewMode=false;
  mode='すべて'; showPage('quiz'); nextQuestion();
}
function loadWrong(){
  try{return new Set(JSON.parse(localStorage.getItem(WRONG_KEY)||'[]'))}catch{return new Set()}
}
function saveWrong(set){localStorage.setItem(WRONG_KEY,JSON.stringify([...set]))}
function startWrongReview(){
  const wrong=loadWrong();
  if(!wrong.size){alert('復習する間違い問題はありません。');return;}
  quizLimit=null; quizAnsweredThisRun=0; reviewMode=true;
  mode='すべて'; showPage('quiz'); nextQuestion();
}
const originalAvailable=available;
available=function(){
  const h=loadHistory();
  if(reviewMode){
    const wrong=loadWrong();
    return QUESTIONS.filter(q=>wrong.has(q.id)&&!h.has('review-'+q.id));
  }
  return QUESTIONS.filter(q=>(mode==='すべて'||q.level===mode)&&!h.has(q.id));
}
const originalAnswer=answer;
answer=function(index,btn){
  if(locked)return;
  const wasCorrect=index===current.answer;
  originalAnswer(index,btn);
  quizAnsweredThisRun++;
  const wrong=loadWrong();
  if(wasCorrect){wrong.delete(current.id)}else{wrong.add(current.id)}
  saveWrong(wrong);

  const cats=JSON.parse(localStorage.getItem(CAT_KEY)||'{}');
  if(!cats[current.category]) cats[current.category]={answered:0,correct:0};
  cats[current.category].answered++;
  if(wasCorrect) cats[current.category].correct++;
  localStorage.setItem(CAT_KEY,JSON.stringify(cats));

  if(reviewMode){
    const h=loadHistory(); h.add('review-'+current.id); saveHistory(h);
  }
}
const originalNextQuestion=nextQuestion;
nextQuestion=function(){
  if(quizLimit && quizAnsweredThisRun>=quizLimit){
    alert('今日のチャレンジ10問が終了しました！');
    quizLimit=null; showStats(); return;
  }
  originalNextQuestion();
}
const originalShowPage=showPage;
showPage=function(id){
  originalShowPage(id);
  if(id==='home') updateHome();
}

let salesCase=null,salesStep=0,salesScore=0,salesDisplayedChoices=[];
function startSalesMode(){
  salesCase=SALES_CASES[Math.floor(Math.random()*SALES_CASES.length)];
  salesStep=0;salesScore=0;showPage('sales');renderSalesStep();
}
function renderSalesStep(){
  const step=salesCase.steps[salesStep];
  salesCaseEl=document.getElementById('salesCase');
  salesCaseEl.innerHTML='<h3>お客様カルテ</h3><p>'+salesCase.customer+'</p>';
  salesStepLabel.textContent=step.label;
  salesOptions.innerHTML='<div class="question">'+step.q+'</div>';
  salesDisplayedChoices=arrangeChoicesAtBalancedPosition(step.choices,step.a);
  salesDisplayedChoices.forEach((item,displayIndex)=>{
    const b=document.createElement('button');
    b.className='choice';
    b.textContent=`${displayIndex+1}　${item.text}`;
    b.onclick=()=>answerSales(item.index,b);
    salesOptions.appendChild(b);
  });
  salesResult.classList.add('hidden');
}
function answerSales(i,btn){
  [...salesOptions.querySelectorAll('button')].forEach(b=>b.disabled=true);
  const ok=i===salesCase.steps[salesStep].a;
  btn.classList.add(ok?'correct':'wrong');
  if(ok)salesScore+=25;
  setTimeout(()=>{
    salesStep++;
    if(salesStep<salesCase.steps.length) renderSalesStep();
    else finishSales();
  },650);
}
function finishSales(){
  salesOptions.innerHTML='';
  salesStepLabel.textContent='RESULT';
  let rank=salesScore===100?'👑 パーフェクト':salesScore>=75?'💎 Excellent':salesScore>=50?'🥈 Good':'🔰 Try Again';
  salesResult.classList.remove('hidden');
  salesResult.innerHTML='<div class="resultMark">'+(salesScore>=75?'⭕️':'📘')+'</div><div class="explain"><strong>販買スコア '+salesScore+'点</strong><br>'+rank+'<br><br>お客様の要望・工事条件・比較理由を順番に整理することが大切です。</div><button class="primary next" onclick="startSalesMode()">別のお客様に挑戦</button><button onclick="showPage(\'home\')">ホームへ戻る</button>';
}
