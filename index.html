<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>エアコン販買マスター Ver.31.7</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="styles.css?v=317">
</head>
<body>
<div class="app">
<main>
<section id="home" class="page">
<header class="topbar">
<button class="iconbtn" onclick="openSettings()">☰</button>
<div class="brand">❄ エアコン販買マスター <small id="nameChip"></small></div>
<button class="iconbtn" onclick="openMission()">♧</button>
</header>
<div class="hero">
<div>
<div class="hello" id="helloText">今日も一件、丁寧にご案内しましょう。</div>
<h1>今日の学習状況</h1>
<div class="levelrow"><strong id="levelText">Lv.1</strong><b id="rankText">新人スタッフ</b></div>
<div class="progress"><span id="levelBar" style="width:0%"></span></div>
<p id="nextExp">次のレベルまで あと100EXP</p>
<div class="tip">💡 今日のポイント<br><span>困りごとを先に聞くと、提案がしやすくなります。</span></div>
</div>
<div class="heroimg"><img src="hero-aircon.jpg" alt=""></div>
</div>
<button class="mainbtn" onclick="startRandomSales()"><div class="circle">👥</div><div><h2>販買モード</h2><b>実際の接客をシミュレーション</b><p>お客様対応を通して、販売スキルを磨きましょう。</p></div><span style="font-size:42px">›</span></button>
<div class="menu">
<button id="btnCases" onclick="showCases()"><span class="ico">👤</span><b>お客様カルテ</b><p>お客様を選んで接客練習</p></button>
<button id="btnPractice" onclick="openLevelMenu('practice')"><span class="ico">📖</span><b>練習問題</b><p>180問からランダム出題</p></button>
<button id="btnPrice" onclick="openLevelMenu('price')"><span class="ico">🧮</span><b>工事料金</b><p>工事料金問題だけを出題</p></button>
<button onclick="showStats()"><span class="ico">📊</span><b>成績・分析</b><p>正答率と学習状況を確認</p></button>
<button onclick="showHistory()"><span class="ico">🏆</span><b>学習記録・実績</b><p>学習履歴と達成数を確認</p></button>

</div>
<button class="mission" onclick="openMission()"><span style="font-size:30px">◎</span><div><b>今日のミッション</b><div>販買モードを3件実施する</div></div><strong id="missionHome">0 / 3</strong></button>
<nav class="bottom">
<button onclick="showPage('home')"><span>⌂</span><b>ホーム</b></button>
<button onclick="showHistory()"><span>▣</span><b>学習履歴</b></button>

<button onclick="showSimple('ランキング','自分の学習記録を確認できます。')"><span>▥</span><b>ランキング</b></button>
<button onclick="openSettings()"><span>?</span><b>設定</b></button>
</nav>
</section>

<section id="cases" class="page hidden"><header class="subhead"><button onclick="showPage('home')">‹</button><h2>お客様カルテ</h2><button onclick="startRandomSales()">ランダム</button></header><div class="content"><div id="caseGrid" class="grid"></div></div></section>
<section id="quiz" class="page hidden"><header class="subhead"><button onclick="showPage('home')">‹</button><h2 id="quizTitle">練習問題</h2><button onclick="showPage('home')">終了</button></header><div class="content quizbox"><div class="quiz-meta"><span id="quizRankBadge"></span><div id="quizProgress"></div></div><div id="quizQuestion" class="question"></div><div id="quizChoices" class="choices"></div><div id="quizExplain" class="explain hidden"></div><button id="quizNext" class="primary hidden" onclick="nextQuiz()" style="width:100%;margin-top:14px">次の問題</button></div></section>
<section id="sales" class="page hidden"><header class="subhead"><button onclick="showPage('home')">‹</button><h2>接客シミュレーション</h2><button onclick="showPage('home')">中断</button></header><div class="content"><div id="stepper" class="stepper"></div><div class="sim"><div id="customerPane" class="customerpane"></div><div id="answerPane" class="answerpane"></div></div></div></section>

<section id="statsPage" class="page hidden"><header class="subhead"><button onclick="showPage('home')">‹</button><h2>成績・分析</h2><button onclick="showPage('home')">閉じる</button></header><div class="content"><div id="statsGrid" class="stats"></div></div></section>
<section id="historyPage" class="page hidden"><header class="subhead"><button onclick="showPage('home')">‹</button><h2>学習記録・実績</h2><button onclick="showPage('home')">閉じる</button></header><div class="content" id="historyContent"></div></section>
<section id="simplePage" class="page hidden"><header class="subhead"><button onclick="showPage('home')">‹</button><h2 id="simpleTitle"></h2><button onclick="showPage('home')">閉じる</button></header><div class="content" id="simpleContent"></div></section>
<section id="settings" class="page hidden"><header class="subhead"><button onclick="showPage('home')">‹</button><h2>設定</h2><button onclick="showPage('home')">閉じる</button></header><div class="content"><div class="setting"><label>使う人の名前</label><div class="row"><input id="settingsName" maxlength="20"><button class="primary" onclick="saveNameFromSettings()">保存</button></div></div></div></section>
</main>
</div>

<div id="nameModal" class="modal hidden"><div class="modalcard"><h2>お名前を登録</h2><input id="firstName" maxlength="20" placeholder="例：リサ"><button class="primary" onclick="registerName()">登録して始める</button></div></div>
<div id="missionModal" class="modal hidden"><div class="modalcard"><h2>今日のミッション</h2><p>販買モードを3件実施する</p><div class="progress"><span id="missionBar"></span></div><h3 id="missionText">0 / 3</h3><button class="primary" onclick="closeMission();startRandomSales()">販買モードを始める</button><button onclick="closeMission()">閉じる</button></div></div>

<script src="app-data.js?v=317"></script>
<script src="app.js?v=317"></script>

<div id="levelModal" class="modal hidden">
  <div class="modalcard level-modal-card">
    <h2 id="levelModalTitle">問題レベルを選択</h2>
    <p id="levelModalDescription">出題レベルを選んでください。</p>
    <div class="level-select-grid">
      <button type="button" class="level-choice beginner" onclick="startRankQuiz('初級')">
        <span>🟢</span><b>初級</b><small>基本を確認</small>
      </button>
      <button type="button" class="level-choice intermediate" onclick="startRankQuiz('中級')">
        <span>🔵</span><b>中級</b><small>判断力を強化</small>
      </button>
      <button type="button" class="level-choice advanced" onclick="startRankQuiz('上級')">
        <span>🔴</span><b>上級</b><small>応用問題</small>
      </button>
      <button type="button" class="level-choice random" onclick="startRankQuiz('ランダム')">
        <span>🟣</span><b>ランダム</b><small>全レベルから出題</small>
      </button>
    </div>
    <button type="button" onclick="closeLevelMenu()" class="modal-close-btn">閉じる</button>
  </div>
</div>

</body>
</html>
